<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MHM Race Management</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav>
  <span class="brand">MHM Race 2026</span>
  <ul>
    <li><a href="/results">Results (public)</a></li>
  </ul>
</nav>

<div class="page-header">
  <h1>Sign In</h1>
  <p>Race management access is restricted</p>
</div>

<div class="container" style="max-width:400px;">
  {% if error %}
  <div class="flash" style="background:#fde8e8;border-color:var(--danger);color:#922b21;">{{ error }}</div>
  {% endif %}

  <div class="card">
    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next }}">
      <div class="form-group" style="margin-bottom:.75rem;">
        <label>Username</label>
        <input type="text" name="username" autofocus autocomplete="username" style="width:100%;">
      </div>
      <div class="form-group" style="margin-bottom:1rem;">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password" style="width:100%;">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Sign In</button>
    </form>
  </div>
</div>

</body>
</html>
